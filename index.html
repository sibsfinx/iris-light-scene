<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iris 3D Scene</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
      canvas { display: block; }

      #ui {
        position: fixed;
        bottom: 28px;
        right: 28px;
        display: flex;
        gap: 12px;
        z-index: 10;
      }
      .ui-btn {
        padding: 9px 22px;
        font: 500 13px/1 system-ui, sans-serif;
        color: rgba(210, 225, 255, 0.9);
        background: rgba(8, 12, 38, 0.65);
        border: 1px solid rgba(80, 120, 255, 0.3);
        border-radius: 8px;
        cursor: pointer;
        backdrop-filter: blur(14px);
        letter-spacing: 0.02em;
        transition: background 0.2s, border-color 0.2s, transform 0.1s;
      }
      .ui-btn:hover {
        background: rgba(18, 28, 80, 0.8);
        border-color: rgba(100, 150, 255, 0.55);
      }
      .ui-btn:active { transform: scale(0.97); }
      .ui-btn.active {
        background: rgba(60, 10, 80, 0.80);
        border-color: rgba(180, 80, 255, 0.55);
        color: rgba(240, 200, 255, 0.95);
      }

      #sens-panel {
        display: flex;
        flex-direction: column;
        gap: 7px;
        padding: 10px 14px;
        font: 500 13px/1 system-ui, sans-serif;
        color: rgba(210, 225, 255, 0.9);
        background: rgba(8, 12, 38, 0.65);
        border: 1px solid rgba(80, 120, 255, 0.3);
        border-radius: 8px;
        backdrop-filter: blur(14px);
      }
      .ctrl-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ctrl-row label {
        width: 60px;
        white-space: nowrap;
        letter-spacing: 0.02em;
        opacity: 0.7;
      }
      .ctrl-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 80px;
        height: 3px;
        border-radius: 2px;
        background: rgba(80, 120, 255, 0.35);
        outline: none;
        cursor: pointer;
      }
      .ctrl-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(140, 170, 255, 0.9);
        cursor: pointer;
      }
      .ctrl-slider::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(140, 170, 255, 0.9);
        border: none;
        cursor: pointer;
      }
      .ctrl-val {
        min-width: 2.8em;
        text-align: right;
        font-variant-numeric: tabular-nums;
        opacity: 0.85;
      }

      #hint {
        position: fixed;
        top: 22px;
        left: 22px;
        font: 12px/1.6 system-ui, sans-serif;
        color: rgba(160, 185, 255, 0.28);
        pointer-events: none;
        letter-spacing: 0.03em;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: rgba(160, 185, 255, 0.5);
        font: 13px system-ui, sans-serif;
        letter-spacing: 0.1em;
        transition: opacity 0.6s;
        pointer-events: none;
        z-index: 20;
      }
      #loading.hidden { opacity: 0; }
    </style>
  </head>
  <body>
    <div id="loading">BUILDING SCENE…</div>
    <div id="hint">Drag to orbit · Scroll to zoom · Right-drag to pan</div>
    <div id="ui">
      <div id="sens-panel">
        <div class="ctrl-row">
          <label for="slider-movement">Movement</label>
          <input type="range" id="slider-movement" class="ctrl-slider" min="0.1" max="9" step="0.15" value="1">
          <span id="val-movement" class="ctrl-val">1×</span>
        </div>
        <div class="ctrl-row">
          <label for="slider-color">Color</label>
          <input type="range" id="slider-color" class="ctrl-slider" min="0.1" max="9" step="0.15" value="1">
          <span id="val-color" class="ctrl-val">1×</span>
        </div>
        <div class="ctrl-row">
          <label for="slider-speed">Speed</label>
          <input type="range" id="slider-speed" class="ctrl-slider" min="0.1" max="9" step="0.15" value="1">
          <span id="val-speed" class="ctrl-val">1×</span>
        </div>
      </div>
      <button class="ui-btn" id="btn-mic">🎤 Listen</button>
      <button class="ui-btn" id="btn-fullscreen">⛶ Full</button>
      <button class="ui-btn" id="btn-download">⬇ Download HD</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
