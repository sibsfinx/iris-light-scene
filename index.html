<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iris 3D Scene</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
      canvas { display: block; }

      /* ── Bottom-right UI row ─────────────────────────────────────────────── */
      #ui {
        position: fixed;
        bottom: 28px;
        right: 28px;
        display: flex;
        gap: 10px;
        z-index: 10;
        align-items: center;
      }

      .ui-btn {
        padding: 8px 18px;
        font: 500 12px/1 system-ui, sans-serif;
        color: rgba(200, 218, 255, 0.75);
        background: rgba(6, 10, 30, 0.65);
        border: 1px solid rgba(70, 105, 255, 0.22);
        border-radius: 7px;
        cursor: pointer;
        backdrop-filter: blur(14px);
        letter-spacing: 0.04em;
        transition: background 0.18s, border-color 0.18s, transform 0.1s;
        white-space: nowrap;
      }
      .ui-btn:hover  { background: rgba(14, 22, 72, 0.82); border-color: rgba(100, 140, 255, 0.45); }
      .ui-btn:active { transform: scale(0.97); }
      .ui-btn.on     { border-color: rgba(100, 160, 255, 0.6); color: rgba(180, 210, 255, 0.95); }

      /* ── FPS pill ─────────────────────────────────────────────────────────── */
      #fps {
        font: 500 11px/1 'SF Mono', monospace, system-ui;
        color: rgba(120, 160, 255, 0.35);
        letter-spacing: 0.06em;
        padding: 0 4px;
        pointer-events: none;
      }

      /* ── Hint ─────────────────────────────────────────────────────────────── */
      #hint {
        position: fixed;
        top: 22px; left: 22px;
        font: 12px/1.6 system-ui, sans-serif;
        color: rgba(150, 175, 255, 0.22);
        pointer-events: none;
        letter-spacing: 0.03em;
      }

      /* ── Loader ───────────────────────────────────────────────────────────── */
      #loading {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #000;
        color: rgba(150, 175, 255, 0.45);
        font: 13px system-ui, sans-serif;
        letter-spacing: 0.1em;
        transition: opacity 0.6s;
        pointer-events: none;
        z-index: 20;
      }
      #loading.hidden { opacity: 0; }

      /* ── Controls panel ───────────────────────────────────────────────────── */
      #ctrl-panel {
        position: fixed;
        bottom: 72px; right: 28px;
        width: 226px;
        background: rgba(5, 8, 24, 0.88);
        border: 1px solid rgba(60, 90, 220, 0.18);
        border-radius: 10px;
        backdrop-filter: blur(20px);
        padding: 16px;
        z-index: 9;
        display: none;
        flex-direction: column;
        gap: 14px;
        font: 11px/1.4 system-ui, sans-serif;
        color: rgba(170, 195, 255, 0.65);
      }
      #ctrl-panel.open { display: flex; }

      .ctrl-section { display: flex; flex-direction: column; gap: 8px; }
      .ctrl-label {
        font-size: 9px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(120, 150, 220, 0.45);
      }

      /* Color swatches */
      .swatch-row { display: flex; gap: 7px; }
      .swatch {
        width: 26px; height: 26px;
        border-radius: 5px;
        border: 1.5px solid rgba(255,255,255,0.06);
        cursor: pointer;
        transition: transform 0.12s, border-color 0.12s;
        flex-shrink: 0;
      }
      .swatch:hover  { transform: scale(1.12); }
      .swatch.active { border-color: rgba(140, 180, 255, 0.7); transform: scale(1.1); }
      .swatch[data-bg-color="deep-blue"] { background: #0b1530; }
      .swatch[data-bg-color="stone"]     { background: #1c1510; }
      .swatch[data-bg-color="forest"]    { background: #091308; }
      .swatch[data-bg-color="burgundy"]  { background: #1a0608; }
      .swatch[data-bg-color="off"]       { background: #030203; }

      /* Texture chips */
      .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
      .chip {
        padding: 4px 10px;
        font-size: 10px;
        letter-spacing: 0.05em;
        border-radius: 4px;
        border: 1px solid rgba(70, 100, 220, 0.2);
        background: rgba(10, 15, 45, 0.5);
        color: rgba(160, 185, 255, 0.5);
        cursor: pointer;
        transition: background 0.14s, border-color 0.14s;
      }
      .chip:hover  { background: rgba(20, 30, 80, 0.7); }
      .chip.active { border-color: rgba(110, 155, 255, 0.55); color: rgba(190, 215, 255, 0.9); }

      /* Toggle row */
      .toggle-row { display: flex; gap: 8px; }
      .toggle-btn {
        flex: 1;
        padding: 6px 0;
        text-align: center;
        font-size: 10px;
        letter-spacing: 0.06em;
        border-radius: 5px;
        border: 1px solid rgba(60, 90, 200, 0.2);
        background: rgba(8, 12, 36, 0.5);
        color: rgba(150, 175, 255, 0.45);
        cursor: pointer;
        transition: all 0.15s;
      }
      .toggle-btn:hover { background: rgba(16, 24, 65, 0.7); }
      .toggle-btn.on    { border-color: rgba(100, 150, 255, 0.55); color: rgba(180, 215, 255, 0.9); }

      /* Divider */
      .ctrl-divider { height: 1px; background: rgba(60,90,200,0.1); }
    </style>
  </head>
  <body>
    <div id="loading">BUILDING SCENE…</div>
    <div id="hint">Drag to orbit · Scroll to zoom · Right-drag to pan</div>

    <!-- Controls panel -->
    <div id="ctrl-panel">

      <div class="ctrl-section">
        <span class="ctrl-label">Background</span>
        <div class="swatch-row">
          <div class="swatch active" data-bg-color="deep-blue" title="Deep blue"></div>
          <div class="swatch"        data-bg-color="stone"     title="Stone"></div>
          <div class="swatch"        data-bg-color="forest"    title="Forest"></div>
          <div class="swatch"        data-bg-color="burgundy"  title="Burgundy"></div>
          <div class="swatch"        data-bg-color="off"       title="Off"></div>
        </div>
      </div>

      <div class="ctrl-section">
        <span class="ctrl-label">Texture</span>
        <div class="chip-row">
          <div class="chip active" data-bg-tex="gradient">gradient</div>
          <div class="chip"        data-bg-tex="bokeh">bokeh</div>
          <div class="chip"        data-bg-tex="grid">grid</div>
          <div class="chip"        data-bg-tex="solid">solid</div>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <div class="ctrl-section">
        <span class="ctrl-label">Scene</span>
        <div class="toggle-row">
          <button class="toggle-btn on" id="toggle-rotate">Rotate  ON</button>
          <button class="toggle-btn on" id="toggle-dof">DOF  ON</button>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <div class="ctrl-section">
        <span class="ctrl-label">Performance</span>
        <div style="color: rgba(120,160,255,0.4); font: 500 11px/1 'SF Mono',monospace; letter-spacing:0.08em">
          FPS <span id="fps-val" style="color:rgba(170,200,255,0.7)">—</span>
        </div>
      </div>

    </div>

    <!-- Bottom UI -->
    <div id="ui">
      <span id="fps"></span>
      <button class="ui-btn" id="btn-controls">⚙ Controls</button>
      <button class="ui-btn" id="btn-download">⬇ Download HD</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
